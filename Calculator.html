<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator | Saurav World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#1565c0,#42a5f5,#81d4fa);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:360px;
    background:#ffffff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#1565c0;
    margin-bottom:15px;
}

#display{
    width:100%;
    height:70px;
    font-size:30px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:65px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#e3f2fd;
}

.operator{
    background:#1976d2;
    color:white;
}

.equal{
    background:#2e7d32;
    color:white;
    grid-column:span 2;
}

.clear{
    background:#d32f2f;
    color:white;
}

footer{
    text-align:center;
    margin-top:15px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="calculator">

<h2>🧮 Saurav World Calculator</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="operator" onclick="deleteLast()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<footer>
© 2026 Saurav World
</footer>

</div>

<script>

let display=document.getElementById("display");

function append(value){
    display.value+=value;
}

function clearDisplay(){
    display.value="";
}

function deleteLast(){
    display.value=display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value=eval(display.value);
    }
    catch{
        display.value="Error";
    }
}

// Keyboard Support
document.addEventListener("keydown",function(e){

if((e.key>='0' && e.key<='9') || ['+','-','*','/','.','%'].includes(e.key)){
display.value+=e.key;
}

else if(e.key==="Enter"){
e.preventDefault();
calculate();
}

else if(e.key==="Backspace"){
deleteLast();
}

else if(e.key==="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
