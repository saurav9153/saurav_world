<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unit Converter | Calculation Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
color:white;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#ddd;
margin-bottom:30px;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

select,input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:30px;
padding:20px;
background:white;
color:#111827;
border-radius:15px;
display:none;
text-align:center;
}

.result h2{
margin-bottom:10px;
}

#answer{
font-size:32px;
font-weight:bold;
color:#2563eb;
}

.footer{
margin-top:30px;
text-align:center;
}

.footer a{
background:#2563eb;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:8px;
}

</style>

</head>
<body>

<div class="container">

<h1>🔄 Unit Converter</h1>

<p class="subtitle">
Convert Length, Weight, Temperature and Time instantly.
</p>

<label>Category</label>

<select id="category" onchange="changeUnits()">
<option value="length">Length</option>
<option value="weight">Weight</option>
<option value="temperature">Temperature</option>
<option value="time">Time</option>
</select>

<label>From</label>

<select id="from"></select>

<label>To</label>

<select id="to"></select>

<label>Value</label>

<input type="number" id="value" placeholder="Enter value">

<button onclick="convert()">Convert</button>

<div class="result" id="result">

<h2>Converted Value</h2>

<div id="answer"></div>

</div>

<div class="footer">

<a href="index.html">⬅ Back to Home</a>

</div>

</div>

<script>

const units={

length:["Meter","Kilometer","Centimeter"],

weight:["Kilogram","Gram","Pound"],

temperature:["Celsius","Fahrenheit","Kelvin"],

time:["Second","Minute","Hour"]

};

function changeUnits(){

let category=document.getElementById("category").value;

let from=document.getElementById("from");

let to=document.getElementById("to");

from.innerHTML="";
to.innerHTML="";

units[category].forEach(function(unit){

from.innerHTML+=`<option>${unit}</option>`;

to.innerHTML+=`<option>${unit}</option>`;

});

}

changeUnits();

function convert(){

let cat=document.getElementById("category").value;
let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let value=parseFloat(document.getElementById("value").value);

if(isNaN(value)){
alert("Please enter a value.");
return;
}

let result=value;

/* LENGTH */

if(cat=="length"){

if(from=="Meter") result=value;
if(from=="Kilometer") result=value*1000;
if(from=="Centimeter") result=value/100;

if(to=="Kilometer") result=result/1000;
if(to=="Centimeter") result=result*100;
}

/* WEIGHT */

if(cat=="weight"){

if(from=="Kilogram") result=value;
if(from=="Gram") result=value/1000;
if(from=="Pound") result=value*0.453592;

if(to=="Gram") result=result*1000;
if(to=="Pound") result=result/0.453592;
}

/* TEMPERATURE */

if(cat=="temperature"){

if(from=="Celsius"){

if(to=="Fahrenheit") result=(value*9/5)+32;
else if(to=="Kelvin") result=value+273.15;
else result=value;

}

if(from=="Fahrenheit"){

if(to=="Celsius") result=(value-32)*5/9;
else if(to=="Kelvin") result=((value-32)*5/9)+273.15;
else result=value;

}

if(from=="Kelvin"){

if(to=="Celsius") result=value-273.15;
else if(to=="Fahrenheit") result=((value-273.15)*9/5)+32;
else result=value;

}

}

/* TIME */

if(cat=="time"){

if(from=="Second") result=value;
if(from=="Minute") result=value*60;
if(from=="Hour") result=value*3600;

if(to=="Minute") result=result/60;
if(to=="Hour") result=result/3600;

}

document.getElementById("result").style.display="block";

document.getElementById("answer").innerHTML=result.toFixed(4)+" "+to;

}

</script>

</body>
</html>
